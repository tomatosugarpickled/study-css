<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우선순위 - 중요도</title>
    <link rel="stylesheet" href="cascading01.css">
    <style>
        input {
            border: 1px solid black;
        }

        input::placeholder {
            color: aqua;
        }
    </style>
</head>
<body>
    <form action="">
        <div>
            <input type="text" style="color: brown;border: 2px dotted yellow;" placeholder="아이디를 입력해주세요">
        </div>
    </form>
</body>
</html>
