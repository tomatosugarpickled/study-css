<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position - relative</title>
    <style>
        /* #relative {
            width: 200px;
            height: 100px;
            background-color: yellow;
            position: relative;
            top: 40px;
        }

        #div {
            width: 200px;
            height: 100px;
            background-color: red;
        } */
        #element1, #element2, #element3 {
            width: 200px;
            height: 100px;
            position: relative;
        }

        #element1 {
            background-color: orange;
        }

        #element2 {
            background-color: brown;
        }

        #element3 {
            background-color: yellow;
            right: 0;
        }

        div.in {
            width: 50px;
            height: 50px;
            position: absolute;
        }

        div.e1-1 {
            background-color: red;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%)
        }

        div.e1-2 {
            background-color: pink;
            right: 0;
        }

        div.e2-1 {
            background-color: black;
            bottom: 0;
            right: 50%;
            translate: calc(50%);
        }

        div.e3-1 {
            background-color: aqua;
        }

        div.e3-2 {
            background-color: blueviolet;
        }
    </style>
</head>
<body>
    <!-- <div id="relative"></div>
    <div id="div"></div> -->

    <div id="element1">
        <div class="in e1-1"></div>
        <div class="in e1-2"></div>
    </div>
    <div id="element2">
        <div class="in e2-1"></div>
    </div>
    <div id="element3">
        <div class="in e3-1"></div>
        <div class="in e3-2"></div>
    </div>
</body>
